name: Continue Config
version: 0.0.1
schema: v1

models:
  - name: nvidia-llama-nemotron-rerank
    provider: openrouter
    model: nvidia/llama-nemotron-rerank-vl-1b-v2:free
    apiKey: ${OPENROUTER_API_KEY}
    completionOptions:
      maxTokens: 8192
      temperature: 0.5
    roles:
      - chat
      - edit
      - autocomplete

  - name: nvidia-nemotron-content-safety
    provider: openrouter
    model: nvidia/nemotron-3.5-content-safety:free
    apiKey: ${OPENROUTER_API_KEY}
    completionOptions:
      maxTokens: 4096
      temperature: 0.3
    roles:
      - chat
      - edit

  - name: google-gemma-4-26b
    provider: openrouter
    model: google/gemma-4-26b-a4b-it:free
    apiKey: ${OPENROUTER_API_KEY}
    completionOptions:
      maxTokens: 2048
      temperature: 0.2
    roles:
      - chat

systemMessage: You are an expert software engineer and AI coding assistant.
