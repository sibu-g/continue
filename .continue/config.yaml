name: Continue Config
version: 0.0.1
schema: v1

models:
  - name: claude-opus
    provider: openrouter
    model: anthropic/claude-opus-4-1
    apiKey: ${OPENROUTER_API_KEY}
    completionOptions:
      maxTokens: 8192
      temperature: 0.5
    roles:
      - chat
      - edit
      - autocomplete

  - name: claude-sonnet
    provider: openrouter
    model: anthropic/claude-sonnet-4-6
    apiKey: ${OPENROUTER_API_KEY}
    completionOptions:
      maxTokens: 4096
      temperature: 0.3
    roles:
      - chat
      - edit

  - name: claude-haiku
    provider: openrouter
    model: anthropic/claude-3-5-haiku-20241022
    apiKey: ${OPENROUTER_API_KEY}
    completionOptions:
      maxTokens: 2048
      temperature: 0.2
    roles:
      - chat

systemMessage: You are an expert software engineer and AI coding assistant.
